# Cerberus (IBiSCo) — configurazione dei tre modelli LLM (le tre "teste").
#
# Un modello per riga, campi separati da ';':
#
#   nome ; repo_cache_hf ; glob_gguf ; porta ; contesto ; max_tokens ; cuda_device ; est_mem_mb
#
#   - nome        : etichetta libera usata nei log e nei file di output
#   - repo_cache  : directory del modello nella cache HF (models--<org>--<repo>)
#   - glob_gguf   : pattern del file .gguf da servire (deve identificarne UNO solo)
#   - porta       : porta locale su cui esporre llama-server per questo modello
#   - contesto    : dimensione della finestra di contesto (-c)
#   - max_tokens  : numero massimo di token generati per risposta
#   - cuda_device : GPU da usare nella modalità 'manual'. Indice LOGICO, cioè
#                   relativo alle sole GPU assegnate dal job SLURM (0 = prima GPU
#                   allocata, 1 = seconda, ...). Per lo split multi-GPU si usa una
#                   lista, es. "1,3". Ignorato in modalità 'auto'.
#   - est_mem_mb  : memoria stimata (MB) richiesta dal modello, usata nella
#                   modalità 'auto' per l'allocazione automatica. Ignorato in
#                   modalità 'manual'.
#
# La modalità si sceglie con la variabile CERBERUS_MODE (manual|auto) passata a
# run_demo_ibisco.sh. Righe vuote e righe che iniziano con '#' sono ignorate.

# nome        ; repo                                          ; glob_gguf      ; porta ; ctx  ; maxtok ; cuda_device ; est_mem_mb
gemma-270m    ; models--ggml-org--gemma-3-270m-GGUF           ; *Q8_0*.gguf    ; 8081  ; 4096 ; 256    ; 0           ; 1024
qwen-coder    ; models--ggml-org--Qwen2.5-Coder-0.5B-Q8_0-GGUF ; *q8_0*.gguf  ; 8082  ; 4096 ; 256    ; 1           ; 2048
qwen3-4b      ; models--ggml-org--Qwen3-4B-GGUF               ; *Q4_K_M*.gguf  ; 8083  ; 8192 ; 512    ; 2           ; 6144

# Esempio di modello grande che eccede una singola V100 (32 GB) e va spezzato su
# più GPU. In modalità 'manual' lo si vincola a due GPU con cuda_device="0,1";
# in modalità 'auto' lo split multi-GPU avviene da sé in base a est_mem_mb.
# (Riga commentata: scommentare e adattare repo/glob per usarla.)
#
# big-70b     ; models--ggml-org--<repo-70b>-GGUF            ; *Q8_0*.gguf    ; 8084  ; 8192 ; 512    ; 0,1         ; 45000

# Note:
# - In modalità 'manual' con l'esempio sopra le tre teste vanno su tre GPU logiche
#   distinte (0,1,2). Se il job riceve GPU fisiche non contigue (es. 0,2,3), la
#   corrispondenza è automatica: logico 0->fisico 0, logico 1->fisico 2,
#   logico 2->fisico 3. Per uno split multi-GPU manuale si usa una lista in
#   cuda_device (es. "0,1"): llama.cpp ripartisce il modello tra quelle GPU.
# - In modalità 'auto' i campi cuda_device sono ignorati: i modelli vengono
#   distribuiti sulle GPU disponibili in base a est_mem_mb (first-fit). Un modello
#   che non entra in una singola GPU viene automaticamente spezzato su più GPU con
#   un --tensor-split proporzionale alla memoria libera di ciascuna.
# - Il file .gguf di Qwen3-4B deve essere presente in cache; se manca (solo README),
#   scaricarlo (vedi guides/llm_download.md):
#       hf download ggml-org/Qwen3-4B-GGUF --include "*Q4_K_M*"
