# Cerberus demo (IBiSCo, single node) — three small models on one node.
# See ../../guides/cerberus_tool.md

[allocation]
gpus_per_node = 3

[defaults]
parallel      = 1
kv_cache_type = "f16"
reasoning     = "auto"

[[model]]
label             = "gemma-270m"
hf_repo           = "ggml-org/gemma-3-270m-GGUF"
gguf_file         = "gemma-3-270m-Q8_0.gguf"
alloc_mode        = "AUTO"
max_input_tokens  = 4096
max_output_tokens = 256

[[model]]
label             = "qwen-coder"
hf_repo           = "ggml-org/Qwen2.5-Coder-0.5B-Q8_0-GGUF"
gguf_file         = "qwen2.5-coder-0.5b-q8_0.gguf"
alloc_mode        = "AUTO"
max_input_tokens  = 4096
max_output_tokens = 256

# Qwen3 is a "thinking" model → reasoning on, and a wider output budget.
[[model]]
label             = "qwen3-4b"
hf_repo           = "ggml-org/Qwen3-4B-GGUF"
gguf_file         = "Qwen3-4B-Q4_K_M.gguf"
alloc_mode        = "AUTO"
max_input_tokens  = 4096
max_output_tokens = 1024
reasoning         = "on"
