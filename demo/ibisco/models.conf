# Cerberus demo (IBiSCo, single node) — a big model auto-split over 2 GPUs, plus
# a small one packed alongside, all on ONE node.
# See ../../guides/cerberus_tool.md

[allocation]
gpus_per_node = 3

[defaults]
parallel      = 1
kv_cache_type = "f16"
reasoning     = "auto"

# Llama-3.3-70B Q4_K_M (~40 GiB): does not fit on one 32 GB V100, so AUTO spreads
# it over 2 GPUs (tensor-split) on a single node.
[[model]]
label             = "llama33-70b"
hf_repo           = "lmstudio-community/Llama-3.3-70B-Instruct-GGUF"
gguf_file         = "Llama-3.3-70B-Instruct-Q4_K_M.gguf"
alloc_mode        = "AUTO"
max_input_tokens  = 4096
max_output_tokens = 512

# A small model that packs onto the node's third GPU.
[[model]]
label             = "qwen-coder"
hf_repo           = "ggml-org/Qwen2.5-Coder-0.5B-Q8_0-GGUF"
gguf_file         = "qwen2.5-coder-0.5b-q8_0.gguf"
alloc_mode        = "AUTO"
max_input_tokens  = 4096
max_output_tokens = 256
