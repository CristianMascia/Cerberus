# Cerberus demo (IBiSCo, multi node) — 4 models auto-placed across 2 nodes.
#
# gpus_per_node = 3. The two MANUAL num_gpus=2 models each take two WHOLE GPUs, so
# together they need 4 GPUs > 3 → Cerberus spreads them onto TWO nodes; the small
# AUTO models pack into leftover GPU space. (Splitting a 4B model over 2 GPUs is
# illustrative — the same mechanism serves models that exceed a single 32 GB V100.)
#
# See ../../guides/cerberus_tool.md

[allocation]
gpus_per_node = 3

[defaults]
parallel      = 1
kv_cache_type = "f16"
reasoning     = "auto"

[[model]]
label             = "qwen3-split-a"
hf_repo           = "ggml-org/Qwen3-4B-GGUF"
gguf_file         = "Qwen3-4B-Q4_K_M.gguf"
alloc_mode        = "MANUAL"
num_gpus          = 2
max_input_tokens  = 4096
max_output_tokens = 1024
reasoning         = "on"

[[model]]
label             = "qwen3-split-b"
hf_repo           = "ggml-org/Qwen3-4B-GGUF"
gguf_file         = "Qwen3-4B-Q4_K_M.gguf"
alloc_mode        = "MANUAL"
num_gpus          = 2
max_input_tokens  = 4096
max_output_tokens = 1024
reasoning         = "on"

[[model]]
label             = "gemma-270m"
hf_repo           = "ggml-org/gemma-3-270m-GGUF"
gguf_file         = "gemma-3-270m-Q8_0.gguf"
alloc_mode        = "AUTO"
max_input_tokens  = 4096
max_output_tokens = 256

[[model]]
label             = "qwen-coder"
hf_repo           = "ggml-org/Qwen2.5-Coder-0.5B-Q8_0-GGUF"
gguf_file         = "qwen2.5-coder-0.5b-q8_0.gguf"
alloc_mode        = "AUTO"
max_input_tokens  = 4096
max_output_tokens = 256
