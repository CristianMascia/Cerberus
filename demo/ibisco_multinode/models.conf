# Cerberus demo (IBiSCo, multi node) — two large models auto-placed across 2 nodes.
#
# Each Llama-3.3-70B instance (~40 GiB) is auto-split over 2 GPUs (it can't fit on
# one 32 GB V100). Two of them need 4 whole GPUs > 3 per node, so Cerberus spreads
# them onto TWO nodes; the small AUTO models pack into leftover GPU space. You pin
# nothing — the tool decides placement.
#
# See ../../guides/cerberus_tool.md

[allocation]
gpus_per_node = 3

[defaults]
parallel      = 1
kv_cache_type = "f16"
reasoning     = "auto"

# Two instances of the same 70B GGUF (downloaded once, served twice).
[[model]]
label             = "llama70-a"
hf_repo           = "lmstudio-community/Llama-3.3-70B-Instruct-GGUF"
gguf_file         = "Llama-3.3-70B-Instruct-Q4_K_M.gguf"
alloc_mode        = "AUTO"
max_input_tokens  = 4096
max_output_tokens = 512

[[model]]
label             = "llama70-b"
hf_repo           = "lmstudio-community/Llama-3.3-70B-Instruct-GGUF"
gguf_file         = "Llama-3.3-70B-Instruct-Q4_K_M.gguf"
alloc_mode        = "AUTO"
max_input_tokens  = 4096
max_output_tokens = 512

# Small models that pack into the leftover GPU on each node.
[[model]]
label             = "gemma-270m"
hf_repo           = "ggml-org/gemma-3-270m-GGUF"
gguf_file         = "gemma-3-270m-Q8_0.gguf"
alloc_mode        = "AUTO"
max_input_tokens  = 4096
max_output_tokens = 256

[[model]]
label             = "qwen-coder"
hf_repo           = "ggml-org/Qwen2.5-Coder-0.5B-Q8_0-GGUF"
gguf_file         = "qwen2.5-coder-0.5b-q8_0.gguf"
alloc_mode        = "AUTO"
max_input_tokens  = 4096
max_output_tokens = 256
