# Cerberus multinode (IBiSCo) — 4 modelli su 2 nodi di calcolo (3 GPU per nodo).
#
# Un modello per riga, campi separati da ';':
#
#   nome ; repo_cache_hf ; glob_gguf ; porta ; contesto ; max_tokens ; node ; cuda_device
#
#   - nome        : etichetta libera (log e output)
#   - repo_cache  : directory del modello nella cache HF (models--<org>--<repo>)
#   - glob_gguf   : pattern del file .gguf (deve identificarne UNO solo)
#   - porta       : porta su cui il server ascolta (--host 0.0.0.0)
#   - contesto    : finestra di contesto (-c)
#   - max_tokens  : token massimi generati per risposta
#   - node        : indice del nodo nell'allocazione (0 = master, 1 = worker, ...)
#   - cuda_device : GPU logica/logiche di QUEL nodo. "0" = una GPU; "1,2" = split
#                   su due GPU (llama.cpp ripartisce il modello, split uniforme).
#
# Gli indici node e cuda_device sono LOGICI: 'node' indicizza $SLURM_JOB_NODELIST
# (0 = primo nodo assegnato), 'cuda_device' le GPU allocate su quel nodo.
# Righe vuote e righe che iniziano con '#' sono ignorate.

# nome       ; repo                                            ; glob_gguf     ; porta ; ctx  ; maxtok ; node ; cuda_device
n0-single    ; models--ggml-org--gemma-3-270m-GGUF             ; *Q8_0*.gguf   ; 8081  ; 4096 ; 256    ; 0    ; 0
n0-split     ; models--ggml-org--Qwen3-4B-GGUF                 ; *Q4_K_M*.gguf ; 8082  ; 8192 ; 1024   ; 0    ; 1,2
n1-single    ; models--ggml-org--Qwen2.5-Coder-0.5B-Q8_0-GGUF  ; *q8_0*.gguf  ; 8083  ; 4096 ; 256    ; 1    ; 0
n1-split     ; models--ggml-org--Qwen3-4B-GGUF                 ; *Q4_K_M*.gguf ; 8084  ; 8192 ; 1024   ; 1    ; 1,2

# Nota: lo split su due GPU è qui illustrativo (Qwen3-4B entra in una sola GPU).
# Nella pratica lo split serve per modelli che eccedono la singola GPU (>32 GB su
# V100): basta puntare le righe *-split a un modello grande, il meccanismo è lo stesso.
