# Cerberus — configurazione dei tre modelli LLM (le tre "teste").
#
# Un modello per riga, campi separati da ';':
#
#   nome ; repo_cache_hf ; glob_gguf ; porta ; contesto ; max_tokens
#
#   - nome        : etichetta libera usata nei log e nei file di output
#   - repo_cache  : directory del modello nella cache HF, forma
#                   models--<org>--<repo>
#   - glob_gguf   : pattern del file .gguf da servire all'interno dello
#                   snapshot (es. *Q8_0*.gguf). Deve identificare UN solo file.
#   - porta       : porta locale su cui esporre llama-server per questo modello
#   - contesto    : dimensione della finestra di contesto (-c)
#   - max_tokens  : numero massimo di token generati per risposta
#
# Le righe vuote e quelle che iniziano con '#' vengono ignorate.
# I file .gguf sono risolti automaticamente dalla cache HF montata in bind.

gemma-270m   ; models--ggml-org--gemma-3-270m-GGUF          ; *Q8_0*.gguf ; 8081 ; 4096 ; 256
qwen-coder   ; models--ggml-org--Qwen2.5-Coder-0.5B-Q8_0-GGUF ; *q8_0*.gguf ; 8082 ; 4096 ; 256
# Qwen3 è un modello "thinking": genera prima un blocco di ragionamento, quindi
# serve un max_tokens più ampio, altrimenti la risposta finale resta vuota
# (tutti i token vengono consumati dentro il reasoning).
qwen3-4b     ; models--ggml-org--Qwen3-4B-GGUF              ; *Q4_K_M*.gguf ; 8083 ; 4096 ; 1024

# Nota sulla qualità: gemma-3-270m (270M) e Qwen2.5-Coder-0.5B (0.5B) sono modelli
# molto piccoli, scelti perché leggeri; le loro risposte possono essere ripetitive
# o poco coerenti. È atteso: la demo mostra l'infrastruttura, non la qualità del
# modello. Per output migliori usare modelli instruct più grandi (compatibilmente
# con la VRAM), es. Qwen2.5-3B-Instruct o Llama-3.2-3B-Instruct.

