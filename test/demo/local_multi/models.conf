# Cerberus — configurazione del modello LLM.
#
# Un modello per riga, campi separati da ';':
#
#   nome ; repo_cache_hf ; glob_gguf ; porta ; contesto ; max_tokens
#
#   - nome        : etichetta libera usata nei log e nei file di output
#   - repo_cache  : directory del modello nella cache HF, forma
#                   models--<org>--<repo>
#   - glob_gguf   : pattern del file .gguf da servire all'interno dello
#                   snapshot (es. *Q8_0*.gguf). Deve identificare UN solo file.
#   - porta       : porta locale su cui esporre llama-server per questo modello
#   - contesto    : dimensione della finestra di contesto (-c)
#   - max_tokens  : numero massimo di token generati per risposta
#
# Le righe vuote e quelle che iniziano con '#' vengono ignorate.
# I file .gguf sono risolti automaticamente dalla cache HF montata in bind.

gemma-270m   ; models--ggml-org--gemma-3-270m-GGUF          ; *Q8_0*.gguf ; 8081 ; 20480 ; 512
